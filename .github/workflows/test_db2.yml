# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v3

    - name: Start db2 container
      run: |
        docker run -itd --name db2 --privileged=true -p 50000:50000 -e LICENSE=accept -e DB2INST1_PASSWORD=password -e DBNAME=testdb --platform=linux/amd64 icr.io/db2_community/db2

    - name: Wait database create
      timeout-minutes: 12
      run: |
        for t in {0..140}; do
          python3 -c "
import sys
sys.path.insert(0, '.')
try:
    import drda
    c = drda.connect(host='localhost', database='testdb', user='db2inst1', password='password', port=50000)
    c.close()
    sys.exit(0)
except Exception:
    sys.exit(1)
" && exit 0
          sleep 5
        done
        exit 1

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Test
      run: |
        python test_db2.py
